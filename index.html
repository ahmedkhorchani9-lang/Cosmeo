
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Cosmeo Beauty | Premium Cosmetics</title>
    </head>

    <body>
      <div id="root"></div>
      <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
          const div = document.createElement('div');
          div.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:sans-serif;font-size:14px;';
          div.innerHTML = '<strong>Error Detected:</strong> ' + msg + '<br><small>' + url + ' L:' + lineNo + ' C:' + columnNo + '</small>';
          document.body.appendChild(div);
          return false;
        };
      </script>
      <script type="module" crossorigin src="/src/main.tsx"></script>
    </body>
  </html>
